name: docker-publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags fijos en minúscula. Se quitó docker/metadata-action porque su paso
      # fallaba de forma intermitente (500 de la API de GitHub + deprecación de
      # Node 20) y bloqueaba build + deploy. GHCR exige el nombre en minúscula.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/grupo-verzay/agente-ia-app:latest
            ghcr.io/grupo-verzay/agente-ia-app:${{ github.sha }}
          # Variables PÚBLICAS de Meta (Embedded Signup). Next.js las incrusta en el
          # bundle del cliente en build time, por eso van aquí y no en el stack.
          # No son secretos (viajan al navegador). El secreto (META_APP_SECRET) va
          # como env de runtime en el stack de Portainer, nunca aquí.
          build-args: |
            NEXT_PUBLIC_META_APP_ID=1824198358554727
            NEXT_PUBLIC_META_CONFIG_ID=3051611358381783

      - name: Deploy via Portainer webhook
        run: |
          # Guardamos el cuerpo y capturamos el código HTTP. Antes usábamos
          # "curl -s" a secas: aunque Portainer respondiera 4xx/5xx el paso salía
          # verde y "parecía" desplegado. Ahora fallamos en rojo si no es 2xx.
          code=$(curl -sS -o /tmp/portainer_resp.txt -w "%{http_code}" \
            -X POST "https://panel-n8n.ia-app.com/api/webhooks/ec32a8c7-9eb7-428c-bdfb-bb6ee3215bbf")
          echo "Portainer respondió HTTP $code"
          echo "Cuerpo: $(cat /tmp/portainer_resp.txt)"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::El webhook de Portainer falló (HTTP $code). El redespliegue NO ocurrió."
            exit 1
          fi
          echo "Webhook de Portainer aceptado (HTTP $code)."
