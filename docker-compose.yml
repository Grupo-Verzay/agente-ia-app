version: "3.7"

services:
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    networks:
      - minha_rede
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - SERVER_IDLE_TIMEOUT=300
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  verzay_app:
    image: ghcr.io/grupo-verzay/agente-ia-app:latest
    networks:
      - minha_rede
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=America/Bogota
      - AUTH_TRUST_HOST=true

      - AUTH_SECRET=CAMBIA_ESTE_VALOR
      - NEXTAUTH_URL=https://tu-dominio.com
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?schema=public&pgbouncer=true&connection_limit=5
      - DIRECT_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?schema=public

      - AUTH_RESEND_KEY=CAMBIA_ESTE_VALOR

      - AUTH_GOOGLE_ID=
      - AUTH_GOOGLE_SECRET=
      - AUTH_GITHUB_ID=
      - AUTH_GITHUB_SECRET=

      - S3_ACCESS_KEY=CAMBIA_ESTE_VALOR
      - S3_SECRET_KEY=CAMBIA_ESTE_VALOR
      - S3_ENDPOINT=medias3.verzay.co
      - S3_PUBLIC_URL=https://medias3.verzay.co
      - S3_BUCKET_NAME=verzay-media

      - OPENAI_API_KEY=CAMBIA_ESTE_VALOR
      - GOOGLE_API_KEY=CAMBIA_ESTE_VALOR

      - FOLLOW_UP_RUNNER_URL=
      - FOLLOW_UP_RUNNER_KEY=

      # --- Tiempo real (Chats) ---
      # URL pública del servidor de WebSocket (api-webhook), p. ej.
      # https://webhook.tu-dominio.com . El cliente la recibe vía /api/realtime/token.
      - REALTIME_URL=
      # Secreto compartido con api-webhook para firmar/verificar el token del
      # WebSocket. DEBE ser el MISMO valor en ambos servicios.
      - REALTIME_JWT_SECRET=

      # --- Meta Embedded Signup (WhatsApp Cloud API / Coexistencia) ---
      # Runtime (servidor). El App ID lo usa el server action para intercambiar el
      # code por el token; el App Secret es SECRETO y solo debe existir aquí.
      # Nota: NEXT_PUBLIC_META_APP_ID y NEXT_PUBLIC_META_CONFIG_ID NO van aquí: se
      # inyectan como build-args en el CI (se incrustan en el bundle en build time).
      - META_APP_ID=1824198358554727
      - META_APP_SECRET=CAMBIA_ESTE_VALOR
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 4G
      labels:
        - traefik.enable=true
        - traefik.docker.network=minha_rede
        - traefik.http.routers.verzay_app.rule=Host(`tu-dominio.com`)
        - traefik.http.routers.verzay_app.entrypoints=websecure
        - traefik.http.routers.verzay_app.priority=1
        - traefik.http.routers.verzay_app.tls.certresolver=letsencryptresolver
        - traefik.http.routers.verzay_app.service=verzay_app
        - traefik.http.services.verzay_app.loadbalancer.server.port=3000
        - traefik.http.services.verzay_app.loadbalancer.passHostHeader=true
    depends_on:
      - pgbouncer

networks:
  minha_rede:
    name: minha_rede
    external: true
